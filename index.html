<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIFT Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body ontouchstart="">
    <div id="auth-view" class="view">
        <div class="hero-section" style="padding-top: 60px;">
            <h1 class="main-title">LIFT</h1>
            <div class="subtitle-container">
                <span class="line"></span>
                <p class="subtitle" style="line-height: 1.3;">Workout tracking<br>made simple</p>
                <span class="line"></span>
            </div>
        </div>
        
        <div class="separator"></div>

        <div class="card glass" style="padding: 30px; margin: 20px;">
            <h3 style="text-align:center; margin-bottom:25px; color:var(--primary);">Logga in</h3>
            
            <input type="email" id="login-email" class="log-input" placeholder="E-post" style="margin-bottom:15px;">
            <input type="password" id="login-password" class="log-input" placeholder="Lösenord" style="margin-bottom:20px;">
            
            <button id="login-btn" class="mode-btn blue" style="width:100%; margin-bottom:15px;">
                <span class="btn-main-text">Logga in 🔐</span>
            </button>

            <div class="separator" style="margin: 20px 0;"></div>

            <button id="show-register-btn" class="mode-btn glass-border" style="width:100%;">
                <span class="btn-main-text">Skapa konto ✨</span>
            </button>
        </div>

        <div id="register-card" class="card glass hidden" style="padding: 30px; margin: 20px;">
            <h3 style="text-align:center; margin-bottom:25px; color:var(--primary);">Skapa konto</h3>
            
            <input type="email" id="register-email" class="log-input" placeholder="E-post" style="margin-bottom:15px;">
            <input type="password" id="register-password" class="log-input" placeholder="Lösenord (minst 6 tecken)" style="margin-bottom:20px;">
            
            <button id="register-btn" class="mode-btn green" style="width:100%; margin-bottom:15px;">
                <span class="btn-main-text">Registrera 🚀</span>
            </button>

            <button id="back-to-login-btn" class="mode-btn glass-border" style="width:100%;">
                <span class="btn-main-text">Tillbaka till inloggning</span>
            </button>
        </div>
    </div>
</div>
    <div class="global-header hidden" id="global-header" style="position: relative; width: 100%;">
        <div id="global-logout" class="circle-ctrl" style="position: absolute; right: 15px; top: 15px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 50%; cursor: pointer; transition: all 0.2s ease;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
        </div>
        <div id="global-home" class="circle-ctrl" style="position: absolute; left: 15px; top: 15px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">🏠</div>
    </div>

    <div class="app-container hidden" id="app-container">
        <div id="home-view" class="view">
            <div class="hero-section">
                <h1 class="main-title">LIFT</h1>
                <div class="subtitle-container">
                    <span class="line"></span>
                    <p class="subtitle" style="line-height: 1.3;">Workout tracking<br>made simple</p>
                    <span class="line"></span>
                </div>
            </div>
            
            <div class="separator"></div>

            <div id="draft-alert" class="hidden" style="margin-bottom: 20px;">
                <button id="resume-workout-btn" class="mode-btn orange">
                    <span class="btn-main-text">Fortsätt träningen</span>
                    <span class="btn-icon">⏱️</span>
                </button>
            </div>

            <div class="menu-grid">
                <button id="start-new-btn" class="mode-btn blue main-action">
                    <span class="btn-icon">🔥</span>
                    <div class="btn-text-container">
                        <span class="btn-main-text">Start Workout!</span>
                        <span class="btn-sub-text">Let's go!</span>
                    </div>
                </button>

                <button id="view-exercises-btn" class="mode-btn glass home-card">
                    <span class="btn-icon">🏋️</span>
                    <span class="btn-main-text">EXERCISES</span>
                    <span class="btn-sub-text">Library</span>
                </button>

                <button id="view-programs-btn" class="mode-btn glass home-card">
                    <span class="btn-icon">📋</span>
                    <span class="btn-main-text">WORKOUT PROGRAMS</span>
                    <span class="btn-sub-text">My Workouts</span>
                </button>

                <button id="calendar-mode" class="mode-btn glass home-card">
                    <span class="btn-icon">📅</span>
                    <span class="btn-main-text">WORKOUT LOG</span>
                    <span class="btn-sub-text">Planner</span>
                </button>

                <button id="stats-mode" class="mode-btn glass home-card">
                    <span class="btn-icon">📊</span>
                    <span class="btn-main-text">STATISTICS</span>
                    <span class="btn-sub-text">Progress</span>
                </button>
            </div> 
        </div>

        <div id="calendar-view" class="view hidden">
            <h2 class="section-title modern-header">Scheduling</h2>
            <div id="calendar-info-box"></div>
            <div class="calendar-nav">
                <button onclick="changeMonth(-1)" class="nav-arrow">❮</button>
                <h2 id="month-label" onclick="openMonthPicker()" style="cursor:pointer;"></h2>
                <button onclick="changeMonth(1)" class="nav-arrow">❯</button>
            </div>
            <div class="card calendar-card glass-light">
                <div class="calendar-weekdays">
                    <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
                <div class="legend">
                    <div class="legend-item"><div class="legend-color planned"></div> Planned</div>
                    <div class="legend-item"><div class="legend-color ongoing"></div> Ongoing</div>
                    <div class="legend-item"><div class="legend-color completed"></div> Completed</div>
                </div>
            </div>
        </div>

        <div id="exercises-view" class="view hidden">
            <h2 class="section-title modern-header">Exercises</h2>
            <div id="category-menu" class="category-grid">
                <button class="cat-btn glass" data-cat="Ben" onclick="filterExercises('Ben')"><span class="cat-icon">🦵</span> Ben</button>
                <button class="cat-btn glass" data-cat="Bröst" onclick="filterExercises('Bröst')"><span class="cat-icon">🏋️</span> Bröst</button>
                <button class="cat-btn glass" data-cat="Rygg" onclick="filterExercises('Rygg')"><span class="cat-icon">🪵</span> Rygg</button>
                <button class="cat-btn glass" data-cat="Axlar" onclick="filterExercises('Axlar')"><span class="cat-icon">👐</span> Axlar</button>
                <button class="cat-btn glass" data-cat="Armar" onclick="filterExercises('Armar')"><span class="cat-icon">💪</span> Armar</button>
                <button class="cat-btn glass" data-cat="Bål" onclick="filterExercises('Bål')"><span class="cat-icon">🧘</span> Bål</button>
            </div>
            <div style="display: flex; align-items: center; gap: 15px; margin: 35px 0 20px 0; opacity: 0.8;">
                <div style="flex-grow: 1; height: 1px; background: linear-gradient(to right, transparent, var(--primary), transparent);"></div>
                <div style="width: 8px; height: 8px; background: var(--primary); transform: rotate(45deg); border-radius: 2px; box-shadow: 0 0 10px var(--primary);"></div>
                <div style="flex-grow: 1; height: 1px; background: linear-gradient(to left, transparent, var(--primary), transparent);"></div>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-bottom: 15px; padding-right: 17px;">
                <button class="add-inline-btn" onclick="openCreateExerciseModal()" 
                        style="position: static; transform: none; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 17px; padding: 0; line-height: 1;">
                    +
                </button>
            </div>
            <div id="exercise-results" class="exercise-bank-list"></div>
        </div>

        <div id="programs-view" class="view hidden">
            <h2 class="section-title modern-header">Workout Programs</h2>
            <div id="pass-selector-list"></div>
            <div id="program-details-area" class="hidden">
                <div class="separator" style="margin: 30px 0;"></div>
                <div id="program-exercise-list" class="card glass-modern"></div>
            </div>
            <div id="programs-action-btns" style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                 <button id="add-custom-group-btn" class="mode-btn glass-border" style="border: 2px dashed rgba(129, 140, 248, 0.4); color: var(--secondary); background: rgba(129, 140, 248, 0.04); font-weight: 700;">+ Skapa Ny Grupp</button>
                <button id="add-custom-pass-btn" class="mode-btn glass-border" style="border: 2px dashed rgba(34, 211, 238, 0.4); color: var(--primary); background: rgba(34, 211, 238, 0.04); font-weight: 700;">+ Skapa Nytt Pass</button>
            </div>
        </div>

        <div id="stats-view" class="view hidden">
            <h2 class="section-title modern-header">Statistics</h2>
            <div class="card glass">
                <h3 style="text-align:center; margin-bottom:20px;">Workouts per month</h3>
                <div id="chart-container" class="chart-wrapper"></div>
            </div>
        </div>

        <div id="workout-view" class="view hidden">
            <h2 id="active-title" class="section-title modern-header" style="margin-bottom:10px;"></h2>
            <div class="card glass" style="margin-bottom: 20px; padding: 15px;">
                <div id="workout-timer" class="timer-display">00:00:00</div>
                <div style="display: flex; gap: 10px;">
                    <button id="timer-toggle-btn" class="mode-btn glass-border" style="margin-bottom:0; padding:10px;">Pausa ⏸️</button>
                </div>
            </div>
            <div id="exercise-list"></div>
            <div class="workout-footer">
               <button id="pause-workout-btn" class="mode-btn glass-border">Spara utkast</button>
                <button id="save-workout-btn" class="mode-btn green">Avsluta pass</button>
            </div>
        </div>
    </div>

    <div id="workout-modal" class="modal hidden">
        <div class="modal-content">
            <div id="modal-body"></div>
<button class="mode-btn glass-border" onclick="closeModal()" style="margin-top: 25px; background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%); border: 1px solid rgba(255,255,255,0.25); border-top: 1px solid rgba(255,255,255,0.45); box-shadow: 0 4px 15px rgba(0,0,0,0.2);">Close</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 
<script src="supabase-config.js"></script>
<script src="supabase-data.js"></script>
 
<script src="app.js?v=2.0.0"></script>
</body>
</html>
